name: Build

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore dependencies
        run: dotnet restore HassLink.sln

      - name: Build
        run: dotnet build HassLink.sln --no-restore --configuration Release -m

      - name: Test
        run: dotnet test HassLink.sln --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Verify build output
        run: |
          if (!(Test-Path "src/HassLink/bin/Release/net8.0-windows/win-x64/hass-link.exe")) {
            Write-Error "Build output not found"
            exit 1
          }
        shell: pwsh
