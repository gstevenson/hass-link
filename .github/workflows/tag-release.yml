name: Tag and Release on Version Bump

on:
  push:
    branches: [ main ]
    paths:
      - src/HassLink/HassLink.csproj

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to compare versions

      - name: Detect version change
        id: version
        run: |
          NEW=$(grep -oP '(?<=<Version>)[^<]+' src/HassLink/HassLink.csproj)
          OLD=$(git show HEAD~1:src/HassLink/HassLink.csproj | grep -oP '(?<=<Version>)[^<]+' || echo "")
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "old=$OLD" >> $GITHUB_OUTPUT
          echo "changed=$([[ $NEW != $OLD ]] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "v${{ steps.version.outputs.new }}"
